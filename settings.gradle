pluginManagement {
    settings.ext.artifactoryBaseUrl = System.getenv('ARTIFACTORY_URL') ?: 'https://your.domain/artifactory'

    repositories {
        maven {
            url = uri("${settings.ext.artifactoryBaseUrl}/gradle-plugins-proxy")
        }
        maven {
            url = uri("${settings.ext.artifactoryBaseUrl}/maven-central-proxy")
        }
        // Uncomment to access repositories directly, bypassing Artifactory
        // gradlePluginPortal()
        // mavenCentral()
    }
}

dependencyResolutionManagement {
    repositoriesMode = RepositoriesMode.PREFER_SETTINGS
    repositories {
        maven {
            url = uri("${settings.ext.artifactoryBaseUrl}/maven-central-proxy")
        }
    }
}
