pluginManagement {
    settings.ext.artifactoryBaseUrl = 'https://artifactory.daos.hpc.amslabs.hpecorp.net/artifactory'

    repositories {
        maven {
            url = uri("${settings.ext.artifactoryBaseUrl}/gradle-plugins-proxy")
        }
        maven {
            url = uri("${settings.ext.artifactoryBaseUrl}/maven-central-proxy")
        }
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositories {
        maven {
            url = uri("${settings.ext.artifactoryBaseUrl}/maven-central-proxy")
        }
        mavenCentral()
    }
}
